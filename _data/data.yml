career-profile:
    title: About
    summary: |
      Software Architect with over 10 years of experience designing and building
      backend systems and platform infrastructure. Currently driving architecture
      decisions at Mercedes-Benz.io, from domain-level service design to org-wide
      engineering practices. Background in programming languages research, with a
      focus on static analysis and program verification.
