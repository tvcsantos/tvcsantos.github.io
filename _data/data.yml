experiences:
    - role: Software Architect; Software Engineer
      time: 2023 — Present; 2019 — Present
      company: Mercedes-Benz.io
      details: |
        Designing and evolving the backend architecture for Mercedes-Benz
        After Sales digital products, spanning multiple microservices handling
        vehicle service history, warranties, and recalls. Defining technical
        direction, establishing engineering standards, and mentoring developers
        across the team.
      tags:
        - Kotlin
        - Java
        - SQL
        - Spring
        - RabbitMQ
        - PCF
        - AWS
        - K8s
        - Docker
        - Jenkins
        - GitHub Actions
        - SonarQube
        - BlackDuck
        - Jira
        - Confluence
    - role: Software Engineer
      time: 2016 — 2019
      company: Collab
      details: |
        Built and maintained backend services for a high-performance, IP-based
        multimedia contact center platform, where low latency and reliability
        were critical. Responsible for multiple backend services while
        contributing across the broader service landscape. Delivered end-to-end
        features spanning backend and Angular front-end applications.
      tags:
        - C#
        - SQL
        - Java
        - C++
        - C
        - JavaScript
        - TypeScript
        - Angular
        - Azure
        - Azure DevOps
    - role: Research & Teaching Assistant
      time: 2009 — 2016
      company: NOVA School of Science and Technology
      details: |
        Researched static analysis techniques for automatic verification of
        imperative programs with data structures and aliasing. Lectured courses
        across multiple disciplines, including computational logic, programming
        languages, and object-oriented programming for computer science
        students, as well as introductory programming for students in other
        engineering fields such as civil, biomedical, and physics.

projects:
    title: Projects
    assignments:
      - title: Pulse
        link: "https://tvcsantos.github.io/pulse"
        tagline: "An Arduino-based garage parking sensor using ultrasonic distance detection, with LED and buzzer feedback to guide vehicle positioning."

      - title: Tool Reporter Actions
        link: "https://github.com/tvcsantos/tool-reporter-action-template"
