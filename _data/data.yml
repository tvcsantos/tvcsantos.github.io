        link: "https://github.com/tvcsantos/retrosync"
        tagline: "A cross-platform desktop app for managing and organizing retro game ROM libraries."

      - title: v2c-any
        link: "https://github.com/tvcsantos/v2c-any"
        tagline: "A Node.js service that emulates energy meters for V2C EV wallbox dynamic power control, supporting REST and MQTT modes."

