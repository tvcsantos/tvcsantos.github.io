{% assign languages = site.data.data.sidebar.languages %}
{% if languages %}
<section class="languages-container container-block" aria-label="Languages">

  <h2 class="container-block-title">
    Languages
  </h2>

  <ul class="list-unstyled languages-list">
    {% for language in languages %}
    <li>
      {{ language.idiom }}
      <span class="lang-desc">({{ language.level }})</span>
    </li>
    {% endfor %}
  </ul>

</section><!--//languages-->
{% endif %}
