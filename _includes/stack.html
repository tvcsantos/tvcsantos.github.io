{% assign stack = site.data.data.sidebar.stack %}
{% if stack %}
<section class="section stack-section">
  <h2 class="section-title">
    <span class="fa-stack fa-xs" aria-hidden="true">
      <i class="fas fa-circle fa-stack-2x"></i>
      <i class="fas fa-layer-group fa-stack-1x fa-inverse"></i>
    </span>
    Tech Stack
  </h2>

  <ul class="stack-badges" role="list">
    {% for element in stack %}
    <li class="stack-badge" role="listitem">{{ element.item }}</li>
    {% endfor %}
  </ul>
</section><!--//stack-->
{% endif %}
