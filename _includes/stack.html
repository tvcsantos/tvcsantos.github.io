{% assign stack = site.data.data.sidebar.stack %}
{% if stack %}
<section class="stack-container container-block" aria-label="Tech Stack">

  <h2 class="container-block-title">
    Tech Stack
  </h2>

  <ul class="stack-badges" role="list">
    {% for element in stack %}
    <li class="stack-badge" role="listitem">{{ element.item }}</li>
    {% endfor %}
  </ul>

</section><!--//stack-->
{% endif %}
