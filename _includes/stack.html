{% assign stack = site.data.data.sidebar.stack %}
{% if stack %}
<div class="stack-container container-block">

  <h2 class="container-block-title">
    Tech Stack
  </h2>

  <div class="stack-badges">
    {% for element in stack %}
    <span class="stack-badge">{{ element.item }}</span>
    {% endfor %}
  </div>

</div><!--//stack-->
{% endif %}
